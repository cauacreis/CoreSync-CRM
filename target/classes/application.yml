server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:coresyncdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  jjwt:
    secret: "3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b"
    expiration: 86400000

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:your_default_telegram_token}
    username: ${TELEGRAM_BOT_USERNAME:CoreSyncCRM_Bot}

groq:
  api:
    key: ${GROQ_API_KEY:your_default_groq_api_key}
  jpa:
